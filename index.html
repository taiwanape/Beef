<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老王秘滷 | Artisan Braised Beef</title>
    
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 React 與 ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- 引入 Babel 以在瀏覽器中編譯 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- 引入字體 -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .font-serif { font-family: 'Noto Serif TC', serif; }
        .writing-vertical { writing-mode: vertical-rl; text-orientation: upright; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
        .animate-fadeIn { animation: fadeIn 0.4s ease-out forwards; }
        .animate-slideInRight { animation: slideInRight 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    </style>
</head>
<body>
    <!-- React 會渲染在這個 div 裡面 -->
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- SVG Icons ---
        const Icon = ({ path, size = 24, strokeWidth = 2, className = '', style = {} }) => (
          <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className} style={style}>
            {path}
          </svg>
        );
        const ShoppingCart = (p) => <Icon {...p} path={<><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></>} />
        const Menu = (p) => <Icon {...p} path={<><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></>} />
        const X = (p) => <Icon {...p} path={<><path d="M18 6 6 18"/><path d="m6 6 12 12"/></>} />
        const Plus = (p) => <Icon {...p} path={<><path d="M5 12h14"/><path d="M12 5v14"/></>} />
        const Minus = (p) => <Icon {...p} path={<path d="M5 12h14"/>} />
        const ArrowRight = (p) => <Icon {...p} path={<><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></>} />
        const Flame = (p) => <Icon {...p} path={<><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></>} />
        const ShieldCheck = (p) => <Icon {...p} path={<><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="m9 12 2 2 4-4"/></>} />
        const Leaf = (p) => <Icon {...p} path={<><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/></>} />
        const Phone = (p) => <Icon {...p} path={<><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></>} />
        const MessageCircle = (p) => <Icon {...p} path={<><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></>} />
        const Beef = (p) => <Icon {...p} path={<><circle cx="12.5" cy="8.5" r="2.5"/><path d="M12.5 2a6.5 6.5 0 0 0-6.22 4.6c-1.1 3.13-.78 3.9-3.18 6.08A3 3 0 0 0 5 18c4 0 8.4-1.8 11.4-4.3A6.5 6.5 0 0 0 12.5 2Z"/><path d="m18.5 6 2.19 4.5a6.48 6.48 0 0 1 .31 2 6.49 6.49 0 0 1-2.6 5.2C15.4 20.2 11 22 7 22a3 3 0 0 1-2.68-1.66L2.4 16.5"/></>} />

        // --- Artisan Brush / Torn Paper Edges ---
        const TornPaperTop = ({ color }) => (
          <svg viewBox="0 0 1440 48" className="w-full h-8 md:h-12 block -mb-[1px] relative z-10" preserveAspectRatio="none" fill={color}>
            <path d="M0,48 C240,48 480,12 720,24 C960,36 1200,12 1440,24 L1440,0 L0,0 Z" opacity="0.8"/>
            <path d="M0,48 C320,36 640,48 960,36 C1280,24 1360,48 1440,36 L1440,0 L0,0 Z" />
          </svg>
        );

        const TornPaperBottom = ({ color }) => (
          <svg viewBox="0 0 1440 48" className="w-full h-8 md:h-12 block -mt-[1px] relative z-10" preserveAspectRatio="none" fill={color}>
            <path d="M0,0 C240,0 480,36 720,24 C960,12 1200,36 1440,24 L1440,48 L0,48 Z" opacity="0.8"/>
            <path d="M0,0 C320,12 640,0 960,12 C1280,24 1360,0 1440,12 L1440,48 L0,48 Z" />
          </svg>
        );

        function App() {
          const [currentView, setCurrentView] = useState('home');
          const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
          const [isCartOpen, setIsCartOpen] = useState(false);
          const [cart, setCart] = useState([]);

          const colors = {
            bgCream: '#FDFBF7',
            bgSand: '#F3EFE9',
            primaryGreen: '#2B4A3A',
            accentRed: '#A63C24',
            textMain: '#332D2B',
            textMuted: '#756863',
          };

          const products = [
            { id: 1, name: '招牌厚切牛腱心', desc: '嚴選澳洲頂級牛腱心，半筋半肉黃金比例。', weight: '300g / 包', price: 380, tag: '熱銷 NO.1', img: 'https://images.unsplash.com/photo-1588168333986-5078d3ae3976?auto=format&fit=crop&q=80&w=800' },
            { id: 2, name: '秘滷香脆蜂巢肚', desc: '費工清洗，吸滿老滷精華，口感爽脆帶勁。', weight: '200g / 包', price: 320, tag: '下酒必備', img: 'https://images.unsplash.com/photo-1582236531398-4b711a13fcfa?auto=format&fit=crop&q=80&w=800' },
            { id: 3, name: '眷村手作 Q 牛筋', desc: '慢火細熬八小時，滿滿膠原蛋白，不黏牙。', weight: '200g / 包', price: 350, tag: '限量供應', img: 'https://images.unsplash.com/photo-1544025162-81111421568e?auto=format&fit=crop&q=80&w=800' },
            { id: 4, name: '老饕滿漢三寶拼盤', desc: '牛腱、牛肚、牛筋一次滿足，宴客首選。', weight: '700g / 盒', price: 980, tag: '年節送禮', img: 'https://images.unsplash.com/photo-1555939594-58d7cb561ad1?auto=format&fit=crop&q=80&w=800' },
            { id: 5, name: '極致麻辣鴨血豆腐', desc: '獨門辛香料熬製，溫潤麻辣不嗆喉。', weight: '800g / 盒', price: 250, tag: '宵夜良伴', img: 'https://images.unsplash.com/photo-1610057099431-d73a1c9d2f2f?auto=format&fit=crop&q=80&w=800' },
            { id: 6, name: '頂級和牛滷肉燥', desc: '奢侈使用和牛邊角肉，一匙入魂的白飯殺手。', weight: '250g / 包', price: 280, tag: '家常必備', img: 'https://images.unsplash.com/photo-1540189549336-e6e99c3679fe?auto=format&fit=crop&q=80&w=800' },
          ];

          const addToCart = (product) => {
            setCart(prev => {
              const existing = prev.find(item => item.id === product.id);
              if (existing) return prev.map(item => item.id === product.id ? { ...item, qty: item.qty + 1 } : item);
              return [...prev, { ...product, qty: 1 }];
            });
            setIsCartOpen(true);
          };

          const updateQty = (id, delta) => {
            setCart(prev => prev.map(item => {
              if (item.id === id) {
                const newQty = item.qty + delta;
                return newQty > 0 ? { ...item, qty: newQty } : item;
              }
              return item;
            }));
          };

          const removeCartItem = (id) => setCart(prev => prev.filter(item => item.id !== id));
          const cartTotal = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
          const cartCount = cart.reduce((sum, item) => sum + item.qty, 0);

          const navigateTo = (view) => {
            setCurrentView(view);
            setIsMobileMenuOpen(false);
            window.scrollTo({ top: 0, behavior: 'smooth' });
          };

          const HomeView = () => (
            <div className="animate-fadeIn">
              <section className="relative pt-16 pb-32 overflow-hidden" style={{ backgroundColor: colors.bgCream }}>
                <div className="max-w-6xl mx-auto px-4 sm:px-6 flex flex-col md:flex-row items-center gap-12 relative z-10">
                  <div className="w-full md:w-1/2 text-center md:text-left pt-8 md:pt-0">
                    <div className="inline-block border border-[#A63C24] text-[#A63C24] text-xs font-bold tracking-[0.2em] px-4 py-1.5 rounded-sm mb-8">
                      傳承半世紀的眷村手藝
                    </div>
                    <h1 className="text-5xl md:text-6xl lg:text-7xl font-serif font-bold leading-[1.15] mb-8" style={{ color: colors.textMain }}>
                      時間熬煮的<br/>
                      <span style={{ color: colors.primaryGreen }}>極致美味。</span>
                    </h1>
                    <p className="text-lg leading-relaxed mb-10 max-w-md mx-auto md:mx-0" style={{ color: colors.textMuted }}>
                      只選用澳洲頂級牛腱心，搭配二十餘種珍貴漢方香料。不加一滴人工香精，用八小時的溫火慢燉，換來入口即化的感動。
                    </p>
                    <div className="flex flex-col sm:flex-row gap-4 justify-center md:justify-start">
                      <button onClick={() => navigateTo('shop')} className="text-white px-8 py-4 rounded-sm text-lg font-bold tracking-wider hover:opacity-90 transition-opacity shadow-lg" style={{ backgroundColor: colors.accentRed }}>
                        前往線上商城
                      </button>
                    </div>
                  </div>
                  
                  <div className="w-full md:w-1/2 relative">
                     <div className="absolute inset-0 transform translate-x-4 translate-y-4 rounded-tr-[4rem] rounded-bl-[4rem]" style={{ border: `2px solid ${colors.primaryGreen}` }}></div>
                     <img 
                       src="https://images.unsplash.com/photo-1588168333986-5078d3ae3976?auto=format&fit=crop&q=80&w=1000" 
                       alt="招牌厚切牛腱心" 
                       className="relative z-10 w-full h-[400px] md:h-[550px] object-cover rounded-tr-[4rem] rounded-bl-[4rem] shadow-xl"
                     />
                     <div className="absolute -left-6 bottom-12 bg-white p-5 rounded-sm shadow-xl z-20 flex items-center gap-4 border-l-4" style={{ borderColor: colors.accentRed }}>
                       <div className="text-[#A63C24]"><ShieldCheck size={32} /></div>
                       <div>
                         <p className="text-xs font-bold text-gray-500 tracking-wider">SGS 檢驗合格</p>
                         <p className="font-serif font-bold text-lg" style={{ color: colors.textMain }}>100% 無防腐劑</p>
                       </div>
                     </div>
                  </div>
                </div>
              </section>

              <section className="py-24 relative" style={{ backgroundColor: colors.bgSand }}>
                <div className="max-w-6xl mx-auto px-4 sm:px-6">
                  <div className="flex flex-col md:flex-row justify-between items-end mb-16 gap-6">
                    <div>
                      <p className="text-sm font-bold tracking-[0.2em] mb-3" style={{ color: colors.accentRed }}>RECOMMENDATION</p>
                      <h2 className="text-4xl font-serif font-bold" style={{ color: colors.textMain }}>老饕指名・人氣推薦</h2>
                    </div>
                    <button onClick={() => navigateTo('shop')} className="hidden md:flex items-center gap-2 font-bold tracking-wider hover:opacity-70 transition-opacity" style={{ color: colors.primaryGreen }}>
                      查看全品項 <ArrowRight size={20} />
                    </button>
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                    {products.slice(0, 3).map((product) => (
                      <div key={product.id} className="bg-white group cursor-pointer border border-gray-100 shadow-sm hover:shadow-xl transition-all duration-300">
                        <div className="relative overflow-hidden h-72">
                          <div className="absolute top-4 left-4 z-20 text-white text-xs font-bold tracking-wider px-3 py-1 bg-black/50 backdrop-blur-sm rounded-sm">
                            {product.tag}
                          </div>
                          <img src={product.img} alt={product.name} className="w-full h-full object-cover transform group-hover:scale-105 transition-transform duration-700" />
                          
                          <div className="absolute inset-0 bg-black/20 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center">
                            <button 
                              onClick={(e) => { e.stopPropagation(); addToCart(product); }}
                              className="bg-white text-[#2B4A3A] px-6 py-3 rounded-sm font-bold tracking-wider transform translate-y-4 group-hover:translate-y-0 transition-all hover:bg-[#2B4A3A] hover:text-white"
                            >
                              加入購物車
                            </button>
                          </div>
                        </div>
                        
                        <div className="p-6">
                          <div className="flex justify-between items-start mb-2">
                            <h3 className="text-xl font-serif font-bold" style={{ color: colors.textMain }}>{product.name}</h3>
                          </div>
                          <p className="text-sm mb-6 h-10 leading-relaxed" style={{ color: colors.textMuted }}>{product.desc}</p>
                          
                          <div className="flex justify-between items-end pt-4 border-t border-gray-100">
                            <span className="text-xs text-gray-400">{product.weight}</span>
                            <span className="text-2xl font-bold font-serif" style={{ color: colors.accentRed }}>NT$ {product.price}</span>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                  
                  <button onClick={() => navigateTo('shop')} className="md:hidden w-full mt-10 py-4 border border-[#2B4A3A] text-[#2B4A3A] font-bold tracking-wider rounded-sm">
                    查看全品項
                  </button>
                </div>
              </section>

              <TornPaperTop color={colors.primaryGreen} />
              <section className="py-24 relative" style={{ backgroundColor: colors.primaryGreen }}>
                <div className="max-w-6xl mx-auto px-4 sm:px-6 relative z-10 text-center md:text-left">
                  
                  <div className="flex flex-col md:flex-row gap-16 items-center">
                     <div className="w-full md:w-5/12">
                        <h2 className="text-4xl md:text-5xl font-serif font-bold text-white mb-8 leading-tight">
                          好吃，沒有捷徑。<br/>
                          只有對細節的偏執。
                        </h2>
                        <div className="space-y-8">
                          <div className="flex gap-4 text-left">
                            <div className="text-[#F3EFE9] opacity-80 mt-1"><Flame size={28} /></div>
                            <div>
                              <h4 className="text-xl font-bold text-white mb-2 tracking-wider">八小時溫火慢燉</h4>
                              <p className="text-[#F3EFE9] opacity-80 leading-relaxed text-sm">拒絕使用壓力鍋速成。每一鍋老滷都需經過八小時以上的熬煮與靜置，讓肉質軟嫩而不爛，筋花完美入味。</p>
                            </div>
                          </div>
                          <div className="flex gap-4 text-left">
                            <div className="text-[#F3EFE9] opacity-80 mt-1"><Leaf size={28} /></div>
                            <div>
                              <h4 className="text-xl font-bold text-white mb-2 tracking-wider">天然漢方，無化學添加</h4>
                              <p className="text-[#F3EFE9] opacity-80 leading-relaxed text-sm">堅持使用中藥行抓配的二十多種純天然香料。不添加任何防腐劑、味精與人工色素，給家人吃的最安心。</p>
                            </div>
                          </div>
                        </div>
                        <button onClick={() => navigateTo('about')} className="mt-12 text-white border-b border-white pb-1 font-bold tracking-wider hover:opacity-70 transition-opacity">
                          閱讀完整品牌故事 →
                        </button>
                     </div>
                     
                     <div className="w-full md:w-7/12 relative">
                        <img 
                          src="https://images.unsplash.com/photo-1552611052-33e04de081de?auto=format&fit=crop&q=80&w=1000" 
                          alt="料理過程" 
                          className="w-full h-[500px] object-cover rounded-sm opacity-90"
                        />
                        <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2">
                           <div className="bg-white/10 backdrop-blur-md border border-white/30 p-8 rounded-sm">
                             <p className="writing-vertical text-white font-serif tracking-[0.5em] text-xl">五十年の手作り</p>
                           </div>
                        </div>
                     </div>
                  </div>

                </div>
              </section>
              <TornPaperBottom color={colors.primaryGreen} />
            </div>
          );

          const ShopView = () => (
            <div className="animate-fadeIn min-h-screen pt-12 pb-24" style={{ backgroundColor: colors.bgCream }}>
              <div className="max-w-6xl mx-auto px-4 sm:px-6">
                <div className="mb-12 border-b border-gray-200 pb-8 text-center md:text-left">
                  <p className="text-sm font-bold tracking-wider text-gray-400 mb-4">首頁 / 線上商城</p>
                  <h1 className="text-4xl font-serif font-bold" style={{ color: colors.textMain }}>所有商品</h1>
                </div>

                <div className="flex flex-wrap gap-3 mb-12 justify-center md:justify-start">
                  {['全部品項', '招牌牛腱', '脆彈牛肚', '經典拼盤', '麻辣系列'].map((cat, i) => (
                    <button 
                      key={cat} 
                      className={`px-5 py-2 rounded-sm text-sm font-bold tracking-wider transition-colors ${
                        i === 0 
                          ? 'bg-[#2B4A3A] text-white border border-[#2B4A3A]' 
                          : 'bg-transparent text-[#756863] border border-gray-300 hover:border-[#2B4A3A] hover:text-[#2B4A3A]'
                      }`}
                    >
                      {cat}
                    </button>
                  ))}
                </div>

                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-x-8 gap-y-12">
                  {products.map((product) => (
                    <div key={product.id} className="group flex flex-col h-full">
                      <div className="relative overflow-hidden h-80 mb-6 bg-gray-100">
                        <img src={product.img} alt={product.name} className="w-full h-full object-cover transform group-hover:scale-105 transition-transform duration-700" />
                        <div className="absolute top-4 left-4 bg-white text-xs font-bold tracking-wider px-3 py-1 rounded-sm text-[#A63C24]">
                          {product.tag}
                        </div>
                      </div>
                      
                      <div className="flex-grow flex flex-col">
                        <h3 className="text-xl font-serif font-bold mb-2" style={{ color: colors.textMain }}>{product.name}</h3>
                        <p className="text-sm mb-4 leading-relaxed flex-grow" style={{ color: colors.textMuted }}>{product.desc}</p>
                        <p className="text-xs text-gray-400 mb-4">{product.weight}</p>
                        
                        <div className="flex justify-between items-center mt-auto pt-4 border-t border-gray-200">
                          <span className="text-2xl font-bold font-serif" style={{ color: colors.textMain }}>NT$ {product.price}</span>
                          <button 
                            onClick={() => addToCart(product)}
                            className="flex items-center gap-2 text-sm font-bold tracking-wider px-4 py-2 bg-white border border-gray-300 hover:border-[#2B4A3A] hover:bg-[#2B4A3A] hover:text-white transition-colors rounded-sm"
                          >
                            加入購物車 <Plus size={16} />
                          </button>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          );

          const AboutView = () => (
            <div className="animate-fadeIn min-h-screen pt-12 pb-24" style={{ backgroundColor: colors.bgCream }}>
              <div className="max-w-3xl mx-auto px-4 sm:px-6">
                <div className="text-center mb-16">
                  <p className="text-sm font-bold tracking-[0.2em] mb-4" style={{ color: colors.primaryGreen }}>OUR STORY</p>
                  <h1 className="text-4xl font-serif font-bold" style={{ color: colors.textMain }}>關於老王秘滷</h1>
                </div>

                <div className="prose prose-lg mx-auto text-[#756863] leading-loose space-y-8">
                  <img src="https://images.unsplash.com/photo-1540189549336-e6e99c3679fe?auto=format&fit=crop&q=80&w=1000" className="w-full h-96 object-cover rounded-sm shadow-md mb-12" alt="店鋪歷史" />
                  
                  <h3 className="text-2xl font-serif font-bold text-[#332D2B] mt-12 mb-6">起源於 1974 年的南部眷村</h3>
                  <p>
                    老王爺爺當年隨著部隊來到台灣，退伍後定居在南部的眷村。那是一個物資雖然匱乏，但鄰里間充滿人情味的年代。
                  </p>
                  <p>
