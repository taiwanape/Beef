<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五告滷 | 真正入味的台式滷味</title>
    <style>
        :root {
            --primary-color: #4a2512;
            --accent-color: #e65c00;
            --bg-color: #fbf5eb;
            --text-color: #333;
        }
        body {
            margin: 0; font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color); color: var(--text-color);
        }
        header {
            background-color: var(--primary-color); color: white;
            padding: 15px 20px; display: flex; justify-content: space-between;
            align-items: center; position: sticky; top: 0; z-index: 100;
        }
        .logo { font-size: 24px; font-weight: bold; letter-spacing: 2px; }
        .cart { background: var(--accent-color); padding: 5px 15px; border-radius: 20px; cursor: pointer; }
        .hero {
            text-align: center; padding: 60px 20px; background-color: #e3d2bc;
            background-image: linear-gradient(180deg, #e3d2bc 0%, #fbf5eb 100%);
        }
        .hero h1 { font-size: 36px; color: var(--primary-color); margin-bottom: 10px; }
        .hero p { font-size: 18px; color: #666; }
        .products { padding: 40px 20px; max-width: 900px; margin: 0 auto; }
        .products h2 { text-align: center; color: var(--primary-color); margin-bottom: 30px; }
        .grid { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .card {
            background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 100%; max-width: 320px; overflow: hidden; transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-5px); }
        .img-box { height: 200px; display: flex; align-items: center; justify-content: center; font-size: 60px; }
        .egg { background: linear-gradient(135deg, #a0522d, #8b4513); }
        .beef { background: linear-gradient(135deg, #5c2a16, #3e1c0e); }
        .info { padding: 20px; }
        .title { font-size: 20px; font-weight: bold; margin-bottom: 10px; }
        .desc { font-size: 14px; color: #666; line-height: 1.6; margin-bottom: 15px; height: 65px;}
        .price { font-size: 22px; color: var(--accent-color); font-weight: bold; margin-bottom: 15px; }
        .btn {
            display: block; width: 100%; padding: 12px; background: var(--accent-color);
            color: white; border: none; border-radius: 6px; font-size: 16px;
            cursor: pointer; transition: background 0.2s; text-align: center;
        }
        .btn:hover { background: #cc5200; }
        footer { text-align: center; padding: 20px; background: var(--primary-color); color: #aaa; margin-top: 40px; }
    </style>
</head>
<body>

<header>
    <div class="logo">五告滷</div>
    <div class="cart">🛒 購物車 (<span id="cartCount">0</span>)</div>
</header>

<div class="hero">
    <h1>五告滷，真正有夠滷！</h1>
    <p>傳承多年的老滷汁，慢火細熬，把精華通通鎖進食材裡。</p>
</div>

<div class="products">
    <h2>🔥 經典熱銷商品</h2>
    <div class="grid">
        <div class="card">
            <div class="img-box egg">🥚</div>
            <div class="info">
                <div class="title">招牌秘製茶葉蛋</div>
                <div class="desc">嚴選頂級紅玉紅茶與中藥材熬煮72小時，蛋白Q彈、蛋黃綿密，茶香與滷香完美結合。</div>
                <div class="price">NT$ 20 / 顆</div>
                <button class="btn" onclick="addCart('招牌秘製茶葉蛋')">加入購物車</button>
            </div>
        </div>
        <div class="card">
            <div class="img-box beef">🥩</div>
            <div class="info">
                <div class="title">極品半筋半肉滷牛肉</div>
                <div class="desc">嚴選澳洲頂級牛腱心，搭配傳家老滷慢火燉煮。肉質軟嫩多汁，牛筋入口即化。</div>
                <div class="price">NT$ 250 / 份</div>
                <button class="btn" onclick="addCart('極品半筋半肉滷牛肉')">加入購物車</button>
            </div>
        </div>
    </div>
</div>

<footer>
    <p>&copy; 2026 五告滷 Wu-Gao-Lu. All rights reserved.</p>
</footer>

<script>
    let count = 0;
    function addCart(item) {
        count++;
        document.getElementById('cartCount').innerText = count;
        alert('已將「' + item + '」加入購物車！\n\n(這是預覽網站，尚未串接真實金流喔！)');
    }
</script>

</body>
</html>
